#======================================================

[module/keyboard]
type = internal/xkeyboard

blacklist-1 = scroll lock

format = <label-layout> <label-indicator>
format-prefix = " "
format-prefix-font = 2
format-prefix-foreground = ${colors.magenta}

label-layout = %name%

label-indicator-on = " %name%"
label-indicator-on-foreground = ${colors.accent}

#======================================================

[module/date]
type = custom/script
interval = 5
exec = date "+%I:%M %p | %b %d, %G"
label-font = 5
label-foreground = ${colors.foreground}
label-background = ${colors.background}

click-left = eww open calendar

#======================================================

[module/ethernet]
type = internal/network
interface = enp6s0

interval = 5
accumulate-stats = true
unknown-as-up = true

; Connected state
format-connected = <label-connected>
format-connected-prefix = 
format-connected-prefix-font = 1
format-connected-prefix-foreground = ${colors.magenta}
format-connected-background = ${colors.background}
format-connected-padding = 0

label-connected = "Connected"
label-connected-font = 0
label-connected-foreground = ${colors.foreground}

; Disconnected state
format-disconnected = <label-disconnected>
format-disconnected-prefix = 
format-disconnected-prefix-font = 1
format-disconnected-prefix-foreground = ${colors.altforeground}
format-disconnected-background = ${colors.background}
format-disconnected-padding = 0

label-disconnected = " Disconnected"
label-disconnected-font = 0
label-disconnected-foreground = ${colors.red}

#======================================================

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background}
label-active-underline = ${colors.accent}
label-active-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.altred}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.cyan}
label-empty-padding = 1

#======================================================

[module/volume]
type = internal/pulseaudio

sink = 
use-ui-max = false

interval = 5

format-volume = <bar-volume> <label-volume>
format-volume-background = ${colors.background}
format-volume-padding = 0.8

format-volume-prefix = " "
format-volume-prefix-font = 0
format-volume-prefix-foreground = ${colors.accent}

format-muted = <label-muted>
format-muted-prefix = " "
format-muted-prefix-font = 1.3
format-muted-prefix-foreground = ${colors.altforeground}
format-muted-background = ${colors.background}
format-muted-padding = 0.8

label-muted = "||||||||||||| :/"
label-muted-foreground = ${colors.altforeground}

bar-volume-width = 14
bar-volume-gradient = false

bar-volume-indicator = 
bar-volume-indicator-font = 1.3
bar-volume-indicator-foreground = ${colors.green}

bar-volume-fill = |
bar-volume-fill-font = 1.3
bar-volume-foreground-0 = ${colors.white}
bar-volume-foreground-1 = ${colors.green}
bar-volume-foreground-2 = ${colors.green}
bar-volume-foreground-3 = ${colors.magenta}
bar-volume-foreground-4 = ${colors.magenta}
bar-volume-foreground-5 = ${colors.red}
bar-volume-foreground-6 = ${colors.red}

bar-volume-empty = |
bar-volume-empty-font = 1.3

#======================================================

[module/filesystem]
type = internal/fs

mount-0 = /

interval = 10

fixed-values = true

format-mounted = <label-mounted>
format-mounted-background = ${colors.background}
format-mounted-padding = 0

format-mounted-prefix = ""
format-mounted-prefix-font = 2
format-mounted-prefix-foreground = ${colors.red}

label-mounted = " %free%"

#======================================================

[module/memory]
type = internal/memory
interval = 5
format = <label>
format-prefix = "RAM "
format-prefix-font = 2
format-prefix-foreground = ${colors.green}
format-background = ${colors.background}
format-padding = 0.8
label = "%used%"

#======================================================

[module/menu]
type = custom/text

format = 
format-font = 2
format-background = ${colors.background}
format-foreground = ${colors.green}
format-padding = 0.8

click-left =  ~/.config/polybar/rofi_app/launcherapp.sh

#======================================================

[module/cpu]
type = internal/cpu

interval = 5

format = <label>
format-prefix = "CPU" 
format-prefix-font = 2
format-prefix-foreground = ${colors.accent}
format-background = ${colors.background}
format-padding = 0.8

label = " %percentage%%"

#======================================================

[module/nofication]
type = custom/text
format = 
format-font = 2
format-foreground = ${colors.altforeground}
format-background = ${colors.background}
format-padding = 0.8

click-left = ~/.config/polybar/scripts/dunst_history.sh
click-right = dunstctl close-all

#=====================================================

[module/tray]
type = internal/tray

format = <tray>
format-margin = 1px
tray-spacing = 7px
tray-size = 39%
#=====================================================

[module/user]
type = custom/script
exec = echo "$(whoami)@$(hostname)"
inteval = 60

#======================================================

[module/sep0]
type = custom/text
format = "]["
format-font = 2
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.accent}

[module/sep1]
type = custom/text
format = "] "
format-font = 2
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.accent}

[module/sep2]
type = custom/text
format = " ["
format-font = 2
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.accent}
#======================================================
